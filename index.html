<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW-TO-DO-APP</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <script src="script.js" defer></script>
    <script src="status.js" defer></script>
    <script src="edit.js" defer></script>
    <script src="delete.js" defer></script>
    <script src="search.js" defer></script>


</head>

<body>
    <header>
        <div class="container m-3 mx-auto">
            <div class="row">
                <div class="col border text-center p-3">
                    <h1>My-To-Do-App</h1>
                </div>
            </div>
        </div>
    </header>
    <hr>
    <main>
        <div class="container">
            <div class="row">
                <div class="col">
                    <input id="input-task" class="form-control form-control-lg " type="text">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col">
                    <div class="d-grid gap-2 col-6 mx-auto">
                        <button id="add-btn" class="btn btn-primary" type="button">Add - Tasks</button>
                    </div>
                </div>
            </div>
        </div>
        <hr>

        <div class="row mb-3">
            <div class="col-md-4 offset-md-8">
                <select id="filter-tasks" class="form-select bg-dark text-white border-primary">
                    <option value="all">Show All Tasks</option>
                    <option value="completed">Show Completed Only</option>
                    <option value="pending">Show Pending Only</option>
                </select>
            </div>
        </div>

        <div class="container mt-5">
            <div class="row">
                <div class="col">
                    <table class="table table-bordered border-primary table-dark">
                        <thead class="text-center">
                            <tr>
                                <th>S.NO</th>
                                <th class="w-50">TASKS</th>
                                <th>STATUS</th>
                                <th>EDIT</th>
                                <th>DELETE</th>
                            </tr>
                        </thead>
                        <tbody id="tbody">
                            <!-- Tasks render here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>







    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
